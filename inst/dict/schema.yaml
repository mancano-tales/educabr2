schema_version: "0.1.0"
description: >
  Canonical tidy-long schema for all data tables returned by educabr2.
  One row per observation. Alternative sources for the same indicator
  appear as separate rows (filterable via the `source` column), never as
  separate columns. Aggregation levels (e.g. "total" for a dimension) are
  encoded as explicit factor levels, never as NA.

columns:

  - name: year
    type: integer
    role: time
    required: true
    description: Reference year of the observation.

  - name: geo_level
    type: factor
    role: geography
    required: true
    levels: [BR, region, UF]
    description: Geographic aggregation level.

  - name: geo_code
    type: character
    role: geography
    required: true
    description: >
      Geographic code. "BR" for national; IBGE 1-letter macro-region code
      (N, NE, CO, SE, S); IBGE 2-letter UF code (e.g. SP, BA).

  - name: geo_name
    type: character
    role: geography
    required: true
    description: Human-readable geographic name (PT-BR).

  - name: level
    type: factor
    role: dimension_education
    required: false
    appears_in: [enrollment, schooling_attainment, expenditure, progression]
    levels:
      - infantil_creche
      - infantil_pre
      - fundamental
      - fundamental_anos_iniciais
      - fundamental_anos_finais
      - medio
      - fundamental_medio
      - superior
      - eja
      - total
    description: >
      Education stage (Brazilian system). `fundamental_medio` denotes
      educação básica regular (EF + EM) combined — useful for fiscal
      indicators that report basic education as a single aggregate even
      though it spans two stages of the schooling ladder.

  - name: network
    type: factor
    role: dimension_education
    required: false
    appears_in: [enrollment]
    levels:
      - federal
      - estadual
      - municipal
      - publica
      - privada
      - privada_particular
      - privada_comunitaria_confessional_filantropica
      - privada_lucrativa
      - privada_nao_lucrativa
      - especial
      - total
    description: >
      Administrative dependency. Public network is split into
      federal/estadual/municipal (with `publica` reserved for the
      aggregate). Private network is further split (after the 2009
      CENSUP reform) into for-profit (lucrativa) vs non-profit
      (nao_lucrativa), or — under the pre-2009 scheme — into particular
      vs comunitária/confessional/filantrópica. Use `total` for "no
      network breakdown".

  - name: institution_type
    type: factor
    role: dimension_education
    required: false
    appears_in: [enrollment]
    levels:
      - university
      - university_center
      - faculty
      - faculty_school_institute
      - integrated_faculty
      - integrated_faculty_university_center
      - technology_center
      - technology_center_fat
      - cefet_ifet
      - isolated_establishment
      - total
    description: >
      INEP/MEC institutional category (organização acadêmica):
      Universidade, Centro Universitário, Faculdade,
      Faculdade/Escola/Instituto, Faculdade Integrada, Centro de
      Educação Tecnológica, CEFET/IFET, Estabelecimento Isolado. Use
      `total` for "no institutional breakdown". Only meaningful for
      tertiary (`level = "superior"`).

  - name: modality
    type: factor
    role: dimension_education
    required: false
    appears_in: [enrollment]
    levels: [presencial, ead, total]
    description: >
      Teaching modality: in-person (presencial) or distance (EAD).
      Available from 2000 onwards for tertiary enrollment. Use
      `total` for "no modality breakdown".

  - name: dim_race
    type: factor
    role: dimension_inequality
    required: false
    levels: [white, black, brown, indigenous, asian, total]
    description: >
      IBGE color/race classification (branca, preta, parda, indígena,
      amarela) plus "total".

  - name: dim_sex
    type: factor
    role: dimension_inequality
    required: false
    levels: [female, male, total]

  - name: dim_income_quintile
    type: factor
    role: dimension_inequality
    required: false
    levels: [q1, q2, q3, q4, q5, total]
    description: Per-capita household income quintile.

  - name: dim_location
    type: factor
    role: dimension_inequality
    required: false
    levels: [urban, rural, total]

  - name: age_group
    type: character
    role: dimension_demography
    required: false
    description: >
      Age cut as a compact string (e.g. "5-14", "15+", "25+"). For
      enrollment, the reference age bracket of the indicator. For
      schooling, the population aged X being measured.

  - name: indicator
    type: character
    role: measure
    required: true
    description: Indicator key (see vocabularies/indicators.yaml).

  - name: value
    type: double
    role: measure
    required: true

  - name: unit
    type: factor
    role: measure
    required: true
    levels: [count, percent, percent_gdp, percent_gdp_per_capita, ratio, years]
    description: >
      Unit of the `value` column. `percent` is a 0-100 share (e.g.
      gross enrollment rate); `percent_gdp` denotes "share of GDP"
      (expenditure indicators); `percent_gdp_per_capita` denotes
      "share of GDP per capita" (per-student expenditure expressed in
      the same comparable terms); `ratio` is a unitless ratio
      (typically 0-1+); `years` is years (mean years of schooling);
      `count` is an absolute headcount.

  - name: source
    type: factor
    role: provenance
    required: true
    description: Compact source key (see vocabularies/sources.yaml).

  - name: source_note
    type: character
    role: provenance
    required: false
    description: Short bibliographic reference inline.

  - name: is_derived
    type: logical
    role: provenance
    required: false
    appears_in: [enrollment]
    description: >
      `TRUE` when the row is computed by combining components from
      different sources (e.g. presencial enrollment from one source
      summed with EAD enrollment from another, where the original
      source did not publish the combined total). `FALSE` for rows
      taken directly from a single source. Default behaviour of
      `get_enrollment()` is `include_derived = FALSE`. The exact
      composition is documented in `source_note`.

constraints:
  primary_key:
    - year
    - geo_level
    - geo_code
    - level
    - network
    - institution_type
    - modality
    - dim_race
    - dim_sex
    - dim_income_quintile
    - dim_location
    - age_group
    - indicator
    - source
    - source_note    # variant discriminator (e.g. different INEP Sinopse tables
                     # for the same year both canonicalise to inep_sinopse_censup
                     # but carry distinct source_notes; for derived rows it
                     # records the exact Presencial+EAD composition).
  domain:
    year: { min: 1871, max: 2100 }
    value: { allow_negative: false }

conventions:
  missing:
    rule: >
      Use NA only when the value itself is unknown. Aggregation levels
      ("total" across a dimension) are encoded as the explicit factor
      level "total", never as NA. Columns not applicable to a given
      indicator are omitted from the table rather than filled with NA.
  units:
    count: Absolute headcount.
    percent: 0-100 scale.
    percent_gdp: Share of GDP (0-100 scale).
    percent_gdp_per_capita: Share of GDP per capita (0-100+ scale).
    ratio: Unitless ratio (typically 0-1+).
    years: Years (e.g. mean years of schooling).
  language:
    column_names: english
    factor_levels: english (with PT-BR labels resolved via inst/dict/i18n.yaml)
