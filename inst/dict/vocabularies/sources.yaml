schema_version: "0.1.0"
description: >
  Controlled vocabulary of source keys used in the `source` column.
  Each entry carries provenance metadata that drives `list_sources()`
  and `educabr_cite()`.

sources:

  paglayan_2022:
    short_name: Paglayan
    full_name: >
      Paglayan, A. S. (2022). Education or Indoctrination? The Violent
      Origins of Public Schooling.
    type: academic
    doi: 10.7910/DVN/LKE1WQ
    url: https://doi.org/10.7910/DVN/LKE1WQ
    coverage: { years: [1828, 2015], geo: [BR] }
    notes: >
      Comparative dataset of historical primary-school enrollment.
      Brazilian series interpolated from heterogeneous national sources.

  pnad_ibge:
    short_name: PNAD
    full_name: >
      Pesquisa Nacional por Amostra de Domicílios. Instituto Brasileiro
      de Geografia e Estatística (IBGE).
    type: official_survey
    url: https://www.ibge.gov.br/estatisticas/sociais/educacao/9127-pesquisa-nacional-por-amostra-de-domicilios.html
    coverage: { years: [1967, 2015], geo: [BR, region, UF] }
    notes: >
      Annual household survey (discontinued 2016, replaced by PNAD
      Contínua). Source for enrollment by age, schooling, literacy.

  pnadc_ibge:
    short_name: PNAD Contínua
    full_name: >
      Pesquisa Nacional por Amostra de Domicílios Contínua. IBGE.
    type: official_survey
    url: https://www.ibge.gov.br/estatisticas/sociais/trabalho/9171-pesquisa-nacional-por-amostra-de-domicilios-continua-mensal.html
    coverage: { years: [2012, null], geo: [BR, region, UF] }

  censo_demografico_ibge:
    short_name: Censo Demográfico
    full_name: Censo Demográfico. IBGE.
    type: census
    url: https://www.ibge.gov.br/estatisticas/sociais/populacao/22827-censo-demografico-2022.html
    coverage: { years: [1872, 2022], geo: [BR, region, UF] }

  censo_escolar_inep:
    short_name: Censo Escolar
    full_name: Censo Escolar da Educação Básica. INEP/MEC.
    type: administrative
    url: https://www.gov.br/inep/pt-br/areas-de-atuacao/pesquisas-estatisticas-e-indicadores/censo-escolar
    coverage: { years: [1995, null], geo: [BR, region, UF] }

  anuario_ibge:
    short_name: Anuário IBGE
    full_name: Anuário Estatístico do Brasil. IBGE.
    type: historical_compilation
    url: https://biblioteca.ibge.gov.br/biblioteca-catalogo?id=720&view=detalhes
    coverage: { years: [1908, null], geo: [BR, region, UF] }
    notes: >
      Long-run compilation of administrative statistics; primary source
      for pre-PNAD enrollment series.

  kang_paese_felix_2021:
    short_name: Kang, Paese & Felix (2021)
    full_name: >
      Kang, T. H., Paese, L. H. Z., & Felix, N. F. A. (2021). Late and
      unequal: Enrolments and retention in Brazilian education, 1933-2010.
      Revista de Historia Económica / Journal of Iberian and Latin American
      Economic History, 39(2), 191–218.
    type: academic
    doi: 10.1017/S0212610921000112
    url: https://doi.org/10.1017/S0212610921000112
    coverage: { years: [1933, 2010], geo: [BR, UF] }
    notes: >
      Enrollment counts and rates by stage (EF1, EF2, EF, EM, ES) at BR
      and UF level, 1933-2010, including breakdown by color/race 1960-2010.

  kang_menetrier_2024:
    short_name: Kang & Menetrier (2024)
    full_name: >
      Kang, T. H., & Menetrier, I. (2024). Políticas elitistas e despesas
      públicas em educação no Brasil, 1933-2010. Estudos Econômicos (São
      Paulo), 54(3), e53575434.
    type: academic
    doi: 10.1590/1980-53575434tkim
    url: https://doi.org/10.1590/1980-53575434tkim
    coverage: { years: [1955, 2010], geo: [BR, UF] }
    notes: UF-level enrollment and public expenditure series, 1955-2010.

  kang_menetrier_comim_2024:
    short_name: Kang, Menetrier & Comim (2024)
    full_name: >
      Kang, T. H., Menetrier, I., & Comim, F. (2024). The side effects of
      a big push growth strategy: Export incentives and primary education
      under military rule in Brazil, 1967–1985. Revista de Historia
      Económica / Journal of Iberian and Latin American Economic History,
      42(3), 387–414.
    type: academic
    doi: 10.1017/S0212610924000120
    url: https://doi.org/10.1017/S0212610924000120
    coverage: { years: [1871, 2010], geo: [BR] }
    notes: Historical primary (ensino primário / anos iniciais) enrollment, 1871-2010.

  durham_2005:
    short_name: Durham (2005)
    full_name: >
      Durham, E. R. (2005). Educação superior, pública e privada. In
      S. Schwartzman (Ed.), Os desafios da educação no Brasil
      (pp. 191–233). Rio de Janeiro: Nova Fronteira.
    type: academic
    coverage: { years: [1933, 2003], geo: [BR] }
    notes: >
      Historical tertiary enrollment series (Public/Private). Used as
      one of the alternative sources for 1933-onwards totals in the
      `enrollment_tertiary` dataset.

  maduro_junior_2007:
    short_name: Maduro Junior (2007)
    full_name: >
      Maduro Junior, P. R. R. M. (2007). Taxas de matrícula e gastos em
      educação no Brasil [Dissertação de Mestrado, Fundação Getulio
      Vargas, Escola de Pós-Graduação em Economia – EPGE].
    type: academic_thesis
    url: https://hdl.handle.net/10438/110
    coverage: { years: [1933, 2005], geo: [BR] }
    notes: Tertiary enrollment series reconstructed in the MSc dissertation.

  ibge_seculo_xx:
    short_name: IBGE Estatísticas do Século XX
    full_name: >
      IBGE (2007). Estatísticas do Século XX. Rio de Janeiro: Instituto
      Brasileiro de Geografia e Estatística.
    type: historical_compilation
    url: https://seculoxx.ibge.gov.br/
    coverage: { years: [1907, 1980], geo: [BR] }
    notes: >
      Anuários Estatísticos do Brasil compilados pelo IBGE. As tabelas
      específicas (e.g. `educacao1908_12aeb_008` → AEB 1908-1912,
      tabela 008; `educacao1980aeb_07_2` → AEB 1980, tabela 07.2) são
      referenciadas no `source_note` de cada linha.

  inep_sinopse_censup:
    short_name: INEP Sinopse CENSUP
    full_name: >
      INEP/MEC. Sinopse Estatística da Educação Superior (anos 1995-2008).
    type: administrative
    url: https://www.gov.br/inep/pt-br/areas-de-atuacao/pesquisas-estatisticas-e-indicadores/censo-da-educacao-superior
    coverage: { years: [1995, 2008], geo: [BR] }
    notes: >
      Tabelas publicadas nos relatórios sinopse do INEP. Convenção:
      tabela 4.x e 5.x = matrículas presenciais por categoria
      administrativa; tabela 7.x = matrículas em EAD. A tabela exata
      é referenciada no `source_note`.

  inep_microdados_censup:
    short_name: INEP Microdados CENSUP
    full_name: >
      INEP/MEC. Microdados do Censo da Educação Superior (anos 2009-2024).
    type: administrative_microdata
    url: https://www.gov.br/inep/pt-br/areas-de-atuacao/pesquisas-estatisticas-e-indicadores/censo-da-educacao-superior
    coverage: { years: [2009, 2024], geo: [BR] }
    notes: >
      Agregados a partir das tabelas de cadastro de cursos
      (`MICRODADOS_CADASTRO_CURSOS_*.CSV`) via
      `TP_CATEGORIA_ADMINISTRATIVA` × `TP_MODALIDADE_ENSINO` × `QT_MAT`.
      Mapeamento de categorias administrativas segue a convenção do
      INEP (1=Pública Federal, 2=Pública Estadual, 3=Pública Municipal,
      4=Privada com fins lucrativos, 5=Privada sem fins lucrativos,
      6=Particular, 7=Especial, 8=Comunitária, 9=Confessional). A
      categorização privada muda em 2010 (lucrativa vs não-lucrativa)
      em relação a 2009 (particular vs comunitária/confessional).

  inep_censup_powerbi:
    short_name: INEP CENSUP Power BI
    full_name: >
      INEP/MEC. Painel Power BI do Censo da Educação Superior.
    type: administrative
    url: https://www.gov.br/inep/pt-br/areas-de-atuacao/pesquisas-estatisticas-e-indicadores/censo-da-educacao-superior
    coverage: { years: [2010, 2024], geo: [BR] }
    notes: >
      Painel interativo consolidado do INEP. Para 67% das células
      (modalidade × tipo institucional × categoria administrativa)
      os valores reproduzem exatamente a agregação dos microdados; os
      33% restantes divergem nos totais setoriais agregados
      (publica/privada/municipal sem outras decomposições) a partir
      de 2012, refletindo critérios próprios de aglutinação do painel.
      Mantido neste pacote como estimativa alternativa do INEP — útil
      para validação cruzada e para acompanhar revisões pós-publicação
      dos microdados.

  walter_kang_2023:
    short_name: Walter & Kang (2024)
    full_name: >
      Walter, J. R., & Kang, T. H. (2024). A new dataset of average years
      of schooling in Brazil, 1925–2015. Economic History of Developing
      Regions, 39(3), 307–336. [Originally circulated as FGV-IBRE working
      paper, 2023.]
    type: academic
    doi: 10.1080/20780389.2024.2417268
    url: https://doi.org/10.1080/20780389.2024.2417268
    coverage: { years: [1925, 2015], geo: [BR, region, UF] }
    notes: >
      Mean years of schooling with breakdowns by sex, color/race,
      macro-region, and UF.
