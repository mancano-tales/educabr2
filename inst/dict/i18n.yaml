    fundamental_anos_finais: Fundamental — anos finais
    medio: Ensino médio
    fundamental_medio: Educação básica regular (EF + EM)
    superior: Ensino superior
    eja: Educação de Jovens e Adultos
    primary: Educação primária (ISCED)
    secondary: Educação secundária (ISCED)
    tertiary: Educação terciária (ISCED)
    total: Total
  network:
    federal: Federal
    estadual: Estadual
    municipal: Municipal
    publica: Pública
    privada: Privada
    privada_particular: Privada — Particular
    privada_comunitaria_confessional_filantropica: Privada — Comunitária/Confessional/Filantrópica
    privada_lucrativa: Privada — com fins lucrativos
    privada_nao_lucrativa: Privada — sem fins lucrativos
