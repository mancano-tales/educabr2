schema_version: "0.1.0"
description: >
  Manifest of datasets produced by the ETL pipeline. Each entry binds a
  processed table to its raw input, build script, storage location and
  source vocabulary. Used by build scripts to know what to (re)build and
  by `list_datasets()` to expose data inventory to users.

# When adding a new dataset:
#  1. Drop the raw file under data-raw/sources/<source_key>/ and record
#     its sha256 in `raw_files[].sha256`.
#  2. Write a build script under data-raw/<NN>_build_<dataset>.R that
#     follows the gabarito (read → tidy → validate → annotate → write).
#  3. Append an entry below.
#  4. Add the source to inst/dict/vocabularies/sources.yaml if new.

datasets:

  - name: enrollment_kang_fgv
    theme: enrollment
    description: >
      Enrollment counts and rates compiled by Kang, Paese & Felix (2021)
      and republished by FGV/IBRE in April 2023. Spans national primary
      enrollment from 1871, all stages (EF1, EF2, EF, EM, ES) from 1933,
      a national breakdown by color/race from 1960, and UF-level EF from
      1955 — all through 2010.
    processed_file: data/enrollment_kang_fgv.rda
    build_script: data-raw/01_build_enrollment_kang_fgv.R
    storage: embedded
    release_pointer: null
    geo_level: [BR, UF]
    year_range: [1871, 2010]
    sources: [kang_fgv_ibre_2023]
    indicators: [enrollment_count, enrollment_rate]
    levels: [fundamental_anos_iniciais, fundamental_anos_finais,
             fundamental, medio, superior]
    networks: [total]
    dimensions: [dim_race]
    raw_files:
      - path: data-raw/sources/kang_fgv_ibre_2023/1._matricula_primario_1871_2010_v_abril2023.xlsx
        sha256: ""  # filled by build script (TODO)
      - path: data-raw/sources/kang_fgv_ibre_2023/2._matriculas_txmatriculas_porcor_1960_2010_v_abril2023.xlsx
        sha256: ""
      - path: data-raw/sources/kang_fgv_ibre_2023/4._matricula_txmatriculas_1933_2010_v_abril2023.xlsx
        sha256: ""
      - path: data-raw/sources/kang_fgv_ibre_2023/6._matricula_txmatriculas_estado_1955_2010_v_abril2023.xlsx
        sha256: ""
    post_build:
      - Add `LazyData: true` to DESCRIPTION so the dataset is lazy-loaded.
      - Commit data/enrollment_kang_fgv.rda together with this manifest entry.

  - name: enrollment_tertiary
    theme: enrollment
    description: >
      National (BR) tertiary enrollment compiled across seven primary
      sources: IBGE Estatísticas do Século XX, Durham (2005), Maduro
      Junior (2007), Kang/Paese/Felix (2021), INEP Sinopse CENSUP
      (1995-2008), INEP Microdados CENSUP (2009-2024) and the INEP
      CENSUP Power BI panel. Multiple sources per `(year, network)`
      are kept on purpose to support cross-source comparison. Derived
      rows (Presencial from one source + EAD from another, 2000-2008)
      are flagged via `is_derived` and excluded by default.
    processed_file: data/enrollment_tertiary.rda
    build_script: data-raw/03_build_enrollment_tertiary.R
    storage: embedded
    release_pointer: null
    geo_level: [BR]
    year_range: [1907, 2024]
    sources:
      - ibge_seculo_xx
      - durham_2005
      - maduro_junior_2007
      - kang_paese_felix_2021
      - inep_sinopse_censup
      - inep_microdados_censup
      - inep_censup_powerbi
    indicators: [enrollment_count]
    levels: [superior]
    networks:
      - federal
      - estadual
      - municipal
      - publica
      - privada
      - privada_particular
      - privada_comunitaria_confessional_filantropica
      - privada_lucrativa
      - privada_nao_lucrativa
      - especial
      - total
    dimensions: [institution_type, modality, is_derived]
    raw_files:
      - path: data-raw/sources/tertiary_multisource/data_tertiary_v6_clean.xlsx
        sha256: ""
    post_build:
      - Commit data/enrollment_tertiary.rda together with this manifest entry.

  - name: schooling_kang_fgv
    theme: schooling
    description: >
      Mean years of schooling reconstructed by Walter & Kang (2023) from
      Brazilian Censuses and PNAD. National series 1925–2015 with
      breakdowns by sex and race; macro-region and UF series from 1950.
    processed_file: data/schooling_kang_fgv.rda
    build_script: data-raw/02_build_schooling_kang_fgv.R
    storage: embedded
    release_pointer: null
    geo_level: [BR, region, UF]
    year_range: [1925, 2015]
    sources: [walter_kang_2023]
    indicators: [mean_years_schooling]
    levels: []
    networks: [total]
    dimensions: [dim_race, dim_sex]
    raw_files:
      - path: data-raw/sources/kang_fgv_ibre_2023/3._anos_estudo_1925_2015_v_abril2023.xlsx
        sha256: ""

  - name: expenditure_kang_fgv
    theme: expenditure
    description: >
      Brazilian public expenditure on education, compiled by Kang &
      Menetrier (2024) and republished by FGV/IBRE in April 2023.
      Indicators include expenditure as share of GDP (by stage and
      total), per-student expenditure in the public network as share of
      GDP per capita (by stage), and the "double ratio" comparing
      per-student tertiary spending to per-student EF1 / EF+EM spending.
    processed_file: data/expenditure_kang_fgv.rda
    build_script: data-raw/04_build_expenditure_kang_fgv.R
    storage: embedded
    release_pointer: null
    geo_level: [BR]
    year_range: [1933, 2010]
    sources: [kang_menetrier_2024]
    indicators:
      - expenditure_share_gdp
      - expenditure_per_student_pct_gdp_pc
      - expenditure_double_ratio_es_ef1
      - expenditure_double_ratio_es_ef_em
    levels: [fundamental_anos_iniciais, fundamental_anos_finais,
             fundamental, medio, fundamental_medio, superior, total]
    networks: [publica]
    dimensions: []
    raw_files:
      - path: data-raw/sources/kang_fgv_ibre_2023/5._despesa_pub_educ_1933_2010_v_abril2023.xlsx
        sha256: ""
    post_build:
      - Commit data/expenditure_kang_fgv.rda together with this manifest entry.

  - name: progression_kang_fgv
    theme: progression
    description: >
      Grade-progression series (GDR6 — Gross Distribution Ratio for
      grade 6, defined as enrollment in grades 4-6 divided by
      enrollment in grades 1-3 of the old eight-year primary system)
      reconstructed by Kang, Paese & Felix (2021). Covers BR + 20
      federation units, 1955-2010.
    processed_file: data/progression_kang_fgv.rda
    build_script: data-raw/05_build_progression_kang_fgv.R
    storage: embedded
    release_pointer: null
    geo_level: [BR, UF]
    year_range: [1955, 2010]
    sources: [kang_paese_felix_2021]
    indicators: [gross_distribution_ratio_grade_6]
    levels: [fundamental_anos_iniciais]
    networks: [total]
    dimensions: []
    raw_files:
      - path: data-raw/sources/kang_fgv_ibre_2023/7._gdr6_1955_2010_v_abril2023.xlsx
        sha256: ""
    post_build:
      - Commit data/progression_kang_fgv.rda together with this manifest entry.

  - name: lee_lee_2016
    theme: attainment_comparative
    description: >
      Comparative international educational-attainment series from Lee &
      Lee (2016) "Human capital in the long run" (JDE 122, 147-169).
      111 countries, every 5 years from 1870 to 2010, by sex
      (Total/M/F). Reference population: aged 15-64. The bundled
      indicator is the cumulative share who completed at least the
      level indicated by `level` (primary / secondary / tertiary) —
      re-aggregated from Lee & Lee's non-cumulative `lpc`/`lsc`/`lhc`
      columns. Brazil appears as `geo_code = "BRA"`.
    processed_file: data/lee_lee_2016.rda
    build_script: data-raw/06_build_lee_lee_2016.R
    storage: embedded
    release_pointer: null
    geo_level: [country]
    year_range: [1870, 2010]
    sources: [lee_lee_2016]
    indicators: [attainment_share_completed]
    levels: [primary, secondary, tertiary]
    networks: []
    dimensions: [dim_sex]
    raw_files:
      - path: https://barrolee.github.io/BarroLeeDataSet/LeeLee/LeeLee_v1.dta
        sha256: ""  # remote-only; rebuild fetches from URL each run
    post_build:
      - Commit data/lee_lee_2016.rda together with this manifest entry.
