schema_version: "0.1.0"
description: >
  Manifest of datasets produced by the ETL pipeline. Each entry binds a
  processed table to its raw input, build script, storage location and
  source vocabulary. Used by build scripts to know what to (re)build and
  by `list_datasets()` to expose data inventory to users.

# When adding a new dataset:
#  1. Drop the raw file under data-raw/sources/<source_key>/ and record
#     its sha256 in `raw_files[].sha256`.
#  2. Write a build script under data-raw/<NN>_build_<dataset>.R that
#     follows the gabarito (read → tidy → validate → annotate → write).
#  3. Append an entry below.
#  4. Add the source to inst/dict/vocabularies/sources.yaml if new.

datasets:

  - name: enrollment_kang_fgv
    theme: enrollment
    description: >
      Enrollment counts and rates compiled by Kang, Paese & Felix (2021)
      and republished by FGV/IBRE in April 2023. Spans national primary
      enrollment from 1871, all stages (EF1, EF2, EF, EM, ES) from 1933,
      a national breakdown by color/race from 1960, and UF-level EF from
      1955 — all through 2010.
    processed_file: data/enrollment_kang_fgv.rda
    build_script: data-raw/01_build_enrollment_kang_fgv.R
    storage: embedded
    release_pointer: null
    geo_level: [BR, UF]
    year_range: [1871, 2010]
    sources: [kang_fgv_ibre_2023]
    indicators: [enrollment_count, enrollment_rate]
    levels: [fundamental_anos_iniciais, fundamental_anos_finais,
             fundamental, medio, superior]
    networks: [total]
    dimensions: [dim_race]
    raw_files:
      - path: data-raw/sources/kang_fgv_ibre_2023/1._matricula_primario_1871_2010_v_abril2023.xlsx
        sha256: ""  # filled by build script (TODO)
      - path: data-raw/sources/kang_fgv_ibre_2023/2._matriculas_txmatriculas_porcor_1960_2010_v_abril2023.xlsx
        sha256: ""
      - path: data-raw/sources/kang_fgv_ibre_2023/4._matricula_txmatriculas_1933_2010_v_abril2023.xlsx
        sha256: ""
      - path: data-raw/sources/kang_fgv_ibre_2023/6._matricula_txmatriculas_estado_1955_2010_v_abril2023.xlsx
        sha256: ""
    post_build:
      - Add `LazyData: true` to DESCRIPTION so the dataset is lazy-loaded.
      - Commit data/enrollment_kang_fgv.rda together with this manifest entry.
